<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRTC rollback demo</title>
    <link href="./favicon.png" rel="shortcut icon" type="image/png" />
    <style>
      :root {
        --cell: 1.5em;
        --ch: 1ch;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Courier New", monospace;
        font-size: 16px;
        line-height: var(--cell);
        background: #000;
        color: #ccc;
        padding: var(--cell) calc(var(--ch) * 2);
        max-width: calc(var(--ch) * 80);
        margin: 0 auto;
      }

      /* ── header ── */

      header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: var(--cell);
      }

      h1 {
        font-size: inherit;
        color: #fff;
      }

      /* ── panels ── */

      .panel {
        background: #111;
        border: 1px solid #444;
        padding: var(--cell) calc(var(--ch) * 2);
        margin-bottom: var(--cell);
        position: relative;
      }

      .panel h2 {
        font-size: inherit;
        font-weight: bold;
        color: #fff;
        background: #111;
        position: absolute;
        top: calc(var(--cell) * -0.5);
        left: calc(var(--ch) * 2);
        padding: 0 var(--ch);
        line-height: var(--cell);
      }

      /* ── form ── */

      form > * {
        display: block;
        line-height: var(--cell);
      }

      .field {
        display: flex;
        margin-bottom: calc(var(--cell) * 0.5);
      }

      .field label {
        color: #888;
        min-width: calc(var(--ch) * 10);
      }

      input[type="text"],
      select {
        font-family: inherit;
        font-size: inherit;
        line-height: var(--cell);
        height: var(--cell);
        background: #1a1a1a;
        color: #fff;
        border: 1px solid #333;
        padding: 0 var(--ch);
        width: calc(var(--ch) * 30);
        outline: none;
      }

      input[type="text"]:focus,
      select:focus {
        border-color: #888;
        background: #222;
      }

      input[type="text"]::placeholder {
        color: #444;
      }

      select option {
        background: #1a1a1a;
      }

      .toggle {
        display: flex;
        align-items: baseline;
        gap: var(--ch);
        margin-bottom: calc(var(--cell) * 0.5);
      }

      input[type="checkbox"] {
        appearance: none;
        font-family: inherit;
        font-size: inherit;
        width: calc(var(--ch) * 3);
        height: var(--cell);
        cursor: pointer;
        position: relative;
      }

      input[type="checkbox"]::after {
        content: "[ ]";
        color: #888;
      }

      input[type="checkbox"]:checked::after {
        content: "[x]";
        color: #fff;
      }

      button {
        font-family: inherit;
        font-size: inherit;
        line-height: var(--cell);
        height: var(--cell);
        background: #333;
        color: #fff;
        border: 1px solid #555;
        padding: 0 calc(var(--ch) * 2);
        cursor: pointer;
        margin-top: calc(var(--cell) * 0.5);
      }

      button:hover {
        background: #555;
        border-color: #888;
      }

      button:active {
        background: #fff;
        color: #000;
      }

      /* ── room list ── */

      .room-list {
        list-style: none;
      }

      .room-list li {
        line-height: var(--cell);
        padding: 0 var(--ch);
      }

      .room-list li:hover:not(.empty) {
        background: #1a1a1a;
      }

      .room-list .empty {
        color: #444;
        font-style: italic;
      }

      /* ── debug button ── */

      .debug-btn {
        display: inline-block;
        font-family: inherit;
        font-size: inherit;
        line-height: var(--cell);
        color: #ff3030;
        text-decoration: none;
        font-weight: bold;
        padding: 0 var(--ch);
        border: 2px dotted #ff3030;
      }

      .debug-btn:hover {
        background: #ff3030;
        color: #000;
      }

      /* ── responsive ── */

      @media (max-width: 600px) {
        .field {
          flex-direction: column;
        }
        .field label {
          min-width: 0;
        }
        input[type="text"],
        select {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>WebRTC Rollback Demo</h1>
      <a class="debug-btn" href="debug/">⚙ DEBUGGER</a>
    </header>

    <div class="panel">
      <h2>CREATE ROOM</h2>
      <form id="create-room">
        <div class="field">
          <label>TITLE</label>
          <input type="text" name="title" placeholder="my room" required />
        </div>
        <div class="field">
          <label>MAP</label>
          <select name="map">
            <option value="1">arena_small</option>
            <option value="2">arena_large</option>
            <option value="3">corridor</option>
          </select>
        </div>
        <div class="toggle">
          <input type="checkbox" name="public" id="public" checked />
          <label for="public">PUBLIC</label>
        </div>
        <button type="submit">CREATE</button>
      </form>
    </div>

    <div class="panel">
      <h2>PUBLIC ROOMS</h2>
      <ul id="room-list" class="room-list">
        <li class="empty">looking for rooms...</li>
      </ul>
    </div>

    <script type="module" src="./index.js"></script>
  </body>
</html>
