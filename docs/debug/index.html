<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/favicon.png" rel="shortcut icon" type="image/png" />
    <title>Debugger</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        background: #000;
        color: #ccc;
        font-family: monospace;
        font-size: 13px;
      }

      .app {
        display: flex;
        flex-direction: column;
        height: 100%;
        position: relative;
      }

      #canvas-container {
        flex: 1;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;

        &:focus {
          outline: none;
        }

        &.recording {
          #canvas-overlay {
            display: none;
          }

          &::before {
            content: "";
            pointer-events: none;
            position: absolute;
            z-index: 10;
            inset: 4px;
            border-radius: 4px;
            border: 2px solid #770000;
          }
        }
      }

      #canvas-overlay {
        position: absolute;
        inset: 0;
        z-index: 10;
        cursor: grab;
        &.panning {
          cursor: grabbing;
        }
      }

      /* Tracks bar */
      .tracks {
        flex-shrink: 0;
        display: flex;
        height: 96px;
        border-top: 1px solid #333;
        background: #111;
      }
      .track-labels {
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
      }
      .track-label {
        padding: 0 1em;
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        color: white;
        cursor: pointer;
        user-select: none;
        border-bottom: 1px solid #222;
        background-color: color-mix(in srgb, var(--track-color) 20%, transparent);

        &:hover {
          background-color: color-mix(in srgb, var(--track-color) 40%, transparent);
        }
        &.selected {
          font-weight: bold;
          background-color: color-mix(in srgb, var(--track-color) 100%, transparent);
          /* box-shadow: inset 0px 4px 4px #fff2; */
          /* z-index: 100; */
        }
        &:active {
          background-color: color-mix(in srgb, var(--track-color) 60%, transparent);
        }
      }
      .track-label:last-child {
        border-bottom: none;
      }
      .track-label[data-track="0"] {
        --track-color: #c44;
      }
      .track-label[data-track="1"] {
        --track-color: #48c;
      }
      .track-label[data-track="2"] {
        --track-color: #4a4;
      }
      .track-label[data-track="3"] {
        --track-color: #ca0;
      }
      #tracks-canvas-container {
        flex: 1;
        min-width: 0;
        display: block;
        width: 100%;
        height: 100%;
        position: relative;
      }
      #tracks-canvas {
        cursor: grab;
        position: absolute;
        inset: 0;
        &.panning {
          cursor: grabbing;
        }
      }

      /* Floating controls */
      .controls {
        position: absolute;
        bottom: calc(96px + 0.75rem);
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        padding: 0.4rem 0.6rem;
        gap: 0.5rem;
        background-color: rgba(17, 17, 17, 0.9);
        border: 1px solid #333;
        border-radius: 8px;
        backdrop-filter: blur(8px);
        z-index: 20;
      }
      .controls-playback {
        display: flex;
        align-items: center;
        gap: 0.15rem;
      }
      .controls button {
        font-family: monospace;
        font-size: 14px;
        background-color: transparent;
        color: #ccc;
        border: none;
        width: 2rem;
        height: 2rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
      }
      .controls button:hover {
        background-color: #333;
        color: #fff;
      }
      .controls-settings {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .controls-settings label {
        color: #666;
        font-size: 11px;
      }
      .controls select,
      .controls input[type="number"] {
        font-family: monospace;
        font-size: 12px;
        background-color: #222;
        color: #ccc;
        border: 1px solid #333;
        border-radius: 3px;
        padding: 0.2rem 0.3rem;
        height: 1.75rem;
      }
      .controls input[type="number"] {
        width: 3.5rem;
      }
      .divider {
        width: 1px;
        height: 1.5rem;
        background-color: #333;
      }
      .record-btn {
        color: #c44 !important;
        font-size: 12px !important;
        width: auto !important;
        padding: 0 0.5rem !important;
        gap: 0.3rem;

        &:hover {
          background-color: #c443 !important;
        }
      }
      .record-btn.recording {
        background-color: #c44 !important;
        color: #000 !important;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div id="canvas-container">
        <div id="canvas-overlay"></div>
      </div>

      <div class="controls">
        <div class="controls-playback">
          <button id="play-reverse" title="Play reverse">◀◀</button>
          <button id="play" title="Play">▶▶</button>
        </div>
        <div class="divider"></div>
        <div class="controls-settings">
          <label>speed</label>
          <select id="speed">
            <option value="0.0625">1/16</option>
            <option value="0.125">1/8</option>
            <option value="0.25">1/4</option>
            <option value="0.5">1/2</option>
            <option value="1" selected>1/1</option>
          </select>
          <label>onion</label>
          <input type="number" id="onion" value="0" min="0" />
        </div>
        <div class="divider"></div>
        <button class="record-btn" id="record">⏺ REC</button>
      </div>

      <div class="tracks">
        <div class="track-labels">
          <div class="track-label selected" data-track="0">Player 1</div>
          <div class="track-label" data-track="1">Player 2</div>
          <div class="track-label" data-track="2">Player 3</div>
          <div class="track-label" data-track="3">Player 4</div>
        </div>
        <div id="tracks-canvas-container">
          <canvas id="tracks-canvas"></canvas>
        </div>
      </div>
    </div>
    <script type="module" src="./index.js"></script>
  </body>
</html>
